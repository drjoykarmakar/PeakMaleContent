<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload • Peak Male Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-2xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-black mb-4">Upload Your JCB Content</h1>
        <p class="text-zinc-400 mb-10">Share your best work with the community and earn from views.</p>
        
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
            <div class="border-2 border-dashed border-zinc-600 rounded-3xl p-12 text-center mb-6">
                <i class="fa-solid fa-cloud-upload-alt text-6xl text-orange-400 mb-4"></i>
                <div class="font-bold text-xl">Drop your video here</div>
                <p class="text-sm text-zinc-400 mt-1">MP4 • Up to 2GB • 1080p recommended</p>
            </div>
            
            <input type="text" value="My Best JCB Dig of 2026" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4">
            
            <button onclick="alert('Upload successful! (Demo) Video added to community feed.'); window.location.href='../index.html'" 
                    class="w-full py-4 bg-orange-500 hover:bg-orange-600 font-extrabold text-lg rounded-2xl">
                UPLOAD &amp; PUBLISH
            </button>
        </div>
    </div>
</body>
</html>
